<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#0f0f0f',
              card: '#1a1a1a',
              border: '#2a2a2a',
              hover: '#252525',
            }
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body class="bg-dark-bg text-gray-100 min-h-screen">
  
  <!-- Header with Search -->
  <header class="sticky top-0 z-50 bg-dark-bg/95 backdrop-blur border-b border-dark-border">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex items-center gap-4">
        <!-- Search Bar -->
        <div class="relative flex-1 max-w-xl">
          <input 
            type="text" 
            id="search-input"
            placeholder="Search links... (press / to focus)"
            class="w-full bg-dark-card border border-dark-border rounded-lg px-4 py-2.5 pl-10 
                   text-gray-100 placeholder-gray-500 
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   transition-all"
          >
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <kbd id="search-hint" class="absolute right-3 top-1/2 -translate-y-1/2 px-2 py-0.5 text-xs text-gray-500 bg-dark-border rounded">/</kbd>
        </div>
        
        <!-- Import/Export Buttons -->
        <div class="flex gap-2">
          <button 
            id="import-btn"
            class="px-3 py-2 text-sm text-gray-400 hover:text-gray-200 bg-dark-card border border-dark-border rounded-lg hover:bg-dark-hover transition-colors"
            title="Import links from JSON"
          >
            Import
          </button>
          <button 
            id="export-btn"
            class="px-3 py-2 text-sm text-gray-400 hover:text-gray-200 bg-dark-card border border-dark-border rounded-lg hover:bg-dark-hover transition-colors"
            title="Export links as JSON"
          >
            Export
          </button>
          <button 
            id="reset-btn"
            class="px-3 py-2 text-sm text-gray-400 hover:text-red-400 bg-dark-card border border-dark-border rounded-lg hover:bg-dark-hover transition-colors"
            title="Reset to default links"
          >
            Reset
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    
    <!-- Pinned Section -->
    <section id="pinned-section" class="mb-8">
      <h2 class="text-lg font-semibold text-gray-300 mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
        Pinned
      </h2>
      <div id="pinned-links" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
        <!-- Pinned links rendered here -->
      </div>
    </section>

    <!-- Categories Container -->
    <div id="categories-container">
      <!-- Category sections rendered here -->
    </div>

  </main>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" class="hidden">

  <!-- Scripts (order matters) -->
  <script type="module" src="src/data/links.js"></script>
  <script type="module" src="src/js/storage.js"></script>
  <script type="module" src="src/js/search.js"></script>
  <script type="module" src="src/js/keyboard.js"></script>
  <script type="module" src="src/js/dragdrop.js"></script>
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
