# Netlify configuration
# This file is optional but useful for custom settings

[build]
  # No build command needed for static site
  publish = "."

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/src/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/src/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback (not needed for this app, but good practice)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
